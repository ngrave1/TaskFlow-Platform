x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-common-env: &common-env
  ENVIRONMENT: ${MOD:-development}
  DEBUG: ${DEBUG:-true}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
  REDIS_DB: ${REDIS_DB:-0}
  
  API_GATEWAY_URL: ${API_GATEWAY_URL:-http://api-gateway:8000}
  USER_URL: ${USER_URL:-http://user-service:8000}
  TASK_URL: ${TASK_URL:-http://task-service:8000}
  NOTIFICATION_URL: ${NOTIFICATION_URL:-http://notification-service:8000}
  ANALYTICS_URL: ${ANALYTICS_URL:-http://analytics-service:8000}
  
  DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-10}
  DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW:-10}
  DATABASE_ECHO: ${DATABASE_ECHO:-false}
  
  POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  POSTGRES_USER: ${POSTGRES_USER:-admin}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}

services:  
  postgres:
    image: postgres:16-alpine
    container_name: taskflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
      POSTGRES_DB: postgres
    ports:
      - "5438:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    networks:
      - taskflow-network

  redis:
    image: redis:7-alpine
    container_name: taskflow-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    logging: *default-logging
    networks:
      - taskflow-network

  user-service-migrations:
    build:
      context: .
      dockerfile: docker/python-service.Dockerfile
      args:
        APP_NAME: user_service
    container_name: taskflow-user-service-migrations
    restart: "no"
    environment:
      <<: *common-env
      USER_SERVICE_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin123}@postgres:5432/user_service
      TASK_SERVICE_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin123}@postgres:5432/task_service
      ACCESS_TOKEN_EXPIRE: ${ACCESS_TOKEN_EXPIRE:-15}
      REFRESH_TOKEN_EXPIRE: ${REFRESH_TOKEN_EXPIRE:-30}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/user_service:/app/apps/user_service
      - ./libs/common:/app/libs/common
    command: >
      sh -c "
        cd /app/apps/user_service && 
        alembic upgrade head
      "
    logging: *default-logging
    networks:
      - taskflow-network

  task-service-migrations:
    build:
      context: .
      dockerfile: docker/python-service.Dockerfile
      args:
        APP_NAME: task_service
    container_name: taskflow-task-service-migrations
    restart: "no"
    environment:
      <<: *common-env
      TASK_SERVICE_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin123}@postgres:5432/task_service
      USER_SERVICE_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin123}@postgres:5432/user_service
      TASK_CACHE_TTL: ${TASK_CACHE_TTL:-300}
      TASK_QUEUE_NAME: ${TASK_QUEUE_NAME:-task_notifications}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/task_service:/app/apps/task_service
      - ./libs/common:/app/libs/common
    command: >
      sh -c "
        cd /app/apps/task_service && 
        alembic upgrade head
      "
    logging: *default-logging
    networks:
      - taskflow-network

  api_gateway:
    build:
      context: .
      dockerfile: ./docker/python-service.Dockerfile
      args:
        APP_NAME: api_gateway
    container_name: taskflow-api-gateway
    ports:
      - "8000:8000"
    environment:
      <<: *common-env
      USER_URL: ${USER_URL:-http://user-service:8000}
      TASK_URL: ${TASK_URL:-http://task-service:8000}
      NOTIFICATION_URL: ${NOTIFICATION_URL:-http://notification-service:8000}
      ANALYTICS_URL: ${ANALYTICS_URL:-http://analytics-service:8000}
      TASK_SERVICE_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin123}@postgres:5432/task_service
      USER_SERVICE_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin123}@postgres:5432/user_service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service-migrations:
        condition: service_completed_successfully
      task-service-migrations:
        condition: service_completed_successfully
    volumes:
      - ./apps/api_gateway:/app/apps/api_gateway
      - ./libs/common:/app/libs/common
    command: >
      sh -c "uvicorn apps.api_gateway.src.api_gateway.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    logging: *default-logging
    networks:
      - taskflow-network
      
  user_service:
    build:
      context: .
      dockerfile: ./docker/python-service.Dockerfile
      args:
        APP_NAME: user_service
    container_name: taskflow-user-service
    ports:
      - "8001:8000"
    environment:
      <<: *common-env
      USER_SERVICE_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin123}@postgres:5432/user_service
      TASK_SERVICE_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin123}@postgres:5432/task_service
      ACCESS_TOKEN_EXPIRE: ${ACCESS_TOKEN_EXPIRE:-15}
      REFRESH_TOKEN_EXPIRE: ${REFRESH_TOKEN_EXPIRE:-30}
      USER_CACHE_TTL: ${USER_CACHE_TTL:-300}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service-migrations:
        condition: service_completed_successfully
    volumes:
      - ./apps/user_service:/app/apps/user_service
      - ./libs/common:/app/libs/common
    command: >
      sh -c "uvicorn apps.user_service.src.user_service.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    logging: *default-logging
    networks:
      - taskflow-network

  task_service:
    build:
      context: .
      dockerfile: ./docker/python-service.Dockerfile
      args:
        APP_NAME: task_service
    container_name: taskflow-task-service
    ports:
      - "8002:8000"
    environment:
      <<: *common-env
      TASK_SERVICE_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin123}@postgres:5432/task_service
      USER_SERVICE_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin123}@postgres:5432/user_service
      TASK_CACHE_TTL: ${TASK_CACHE_TTL:-300}
      TASK_QUEUE_NAME: ${TASK_QUEUE_NAME:-task_notifications}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      user_service:
        condition: service_healthy
      task-service-migrations:
        condition: service_completed_successfully
    volumes:
      - ./apps/task_service:/app/apps/task_service
      - ./libs/common:/app/libs/common
    command: >
      sh -c "uvicorn apps.task_service.src.task_service.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    logging: *default-logging
    networks:
      - taskflow-network

  notification_service:
    build:
      context: .
      dockerfile: ./docker/python-service.Dockerfile
      args:
        APP_NAME: notification_service
    container_name: taskflow-notification-service
    ports:
      - "8003:8000"
    environment:
      <<: *common-env
      TASK_SERVICE_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin123}@postgres:5432/task_service
      USER_SERVICE_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin123}@postgres:5432/user_service
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      NOTIFICATION_QUEUE_NAME: ${NOTIFICATION_QUEUE_NAME:-notifications}
      NOTIFICATION_RETRY_ATTEMPTS: ${NOTIFICATION_RETRY_ATTEMPTS:-3}
      NOTIFICATION_RETRY_DELAY: ${NOTIFICATION_RETRY_DELAY:-5}
    depends_on:
      redis:
        condition: service_healthy
      task_service:
        condition: service_healthy
      user_service:
        condition: service_healthy
    volumes:
      - ./apps/notification_service:/app/apps/notification_service
      - ./libs/common:/app/libs/common
    command: >
      sh -c "uvicorn apps.notification_service.src.notification_service.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    logging: *default-logging
    networks:
      - taskflow-network

  analytics_service:
    build:
      context: .
      dockerfile: ./docker/python-service.Dockerfile
      args:
        APP_NAME: analytics_service
    container_name: taskflow-analytics-service
    ports:
      - "8004:8000"
    environment:
      <<: *common-env
      TASK_SERVICE_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin123}@postgres:5432/task_service
      USER_SERVICE_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin123}@postgres:5432/user_service
      AGGREGATION_PERIOD: ${AGGREGATION_PERIOD:-5}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      task_service:
        condition: service_healthy
      user_service:
        condition: service_healthy
    volumes:
      - ./apps/analytics_service:/app/apps/analytics_service
      - ./libs/common:/app/libs/common
    command: >
      sh -c "uvicorn apps.analytics_service.src.analytics_service.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    logging: *default-logging
    networks:
      - taskflow-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  taskflow-network:
    driver: bridge